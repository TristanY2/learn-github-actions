name: Task 7 - Running test on push
on:
  push:
    branches:
      - main

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
        
      - name: Install pytest
        run: pip install pytest

      - name: Run test
        run: pytest
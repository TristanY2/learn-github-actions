name: Task 12 - Final

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  actions: write

jobs:
  Borrar-logs:
    runs-on: ubuntu-latest
    steps:
      - name: Deleting logs
        uses: viascom/github-maintenance-action@v0.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_base_url: 'https://api.github.com'
          repository: ${{ github.repository }}
          retention_days: 0
          keep_minimum_runs: 0
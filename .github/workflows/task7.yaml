name: Task 7 - Automated Code Linting
on:
  push:
    branches:
      - main

jobs:
  lint-python-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linter
        run: pip install flake8

      - name: Run Linter
        run: flake8 .